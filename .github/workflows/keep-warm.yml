name: Keep backend warm

# The contact forms post to the Render free-tier backend, which spins down
# after ~15 min of inactivity and then pays a ~50s cold-start penalty on the
# next request. Pinging the health endpoint every 10 minutes keeps it awake so
# "Lähetä viesti" responds instantly for real visitors.
#
# Cost note: Render's free tier bills by instance-HOURS (~750/month free), not
# by request. Keeping the service awake 24/7 would burn nearly the whole budget
# for no benefit overnight, so we only ping during active hours (04:00-19:59
# UTC ~= 07:00-22:59 Finnish summer time). That is ~480 instance-hours/month,
# well under the free cap, and the warm-up-on-page-load still covers the rare
# off-hours visitor.
#
# Note: scheduled workflows only run from the default branch, so this takes
# effect once merged to main.

on:
  schedule:
    - cron: "*/10 4-19 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          curl -fsS --max-time 90 --retry 3 --retry-delay 10 \
            https://puuhapatet-fi.onrender.com/api/health \
            && echo "Backend is awake" \
            || echo "Ping failed — will retry on the next scheduled run"

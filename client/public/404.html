<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Puuhapatet</title>
    <script>
      // GitHub Pages SPA redirect: forward the path as a query parameter
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          "/?p=" +
          encodeURIComponent(
            l.pathname.slice(1) +
              (l.search ? l.search.slice(1) : "") +
              l.hash
          )
      );
    </script>
  </head>
  <body></body>
</html>
